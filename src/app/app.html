<nav class="navbar navbar-expand navbar-light bg-light px-3">
  <a class="navbar-brand" routerLink="/">Biz Directory</a>

  <div class="navbar-nav">
    <a class="nav-link" routerLink="/">Home</a>
    <a class="nav-link" routerLink="/businesses">Businesses</a>
  </div>

  <div class="ms-auto">
    <ng-container *ngIf="authService.isAuthenticated$ | async; else loggedOut">

      <button
        class="btn btn-outline-primary"
        (click)="authService.logout({ logoutParams: { returnTo: 'http://localhost:4201' } })">
        Logout
      </button>

    </ng-container>

    <ng-template #loggedOut>
      <button
        class="btn btn-outline-primary"
        (click)="authService.loginWithRedirect()">
        Login
      </button>
    </ng-template>
  </div>
</nav>

<router-outlet></router-outlet>
